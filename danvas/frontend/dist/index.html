    <meta charset="UTF-8" />

    <title>danvas</title>
    <style>
      /* Instant pre-JS splash: rendered the moment the HTML parses, so the page
         isn't blank white while the app bundle downloads (noticeable on phones /
         tunnels). It lives inside #root, so React's createRoot().render() clears
         it automatically when the app mounts — no teardown code needed. */
      html, body { margin: 0; height: 100%; }
      #pc-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        background: #0f172a; color: #94a3b8;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #pc-splash .ring {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(148, 163, 184, 0.25); border-top-color: #3b82f6;
        animation: pc-spin 0.8s linear infinite;
      }
      #pc-splash .lbl { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
      @keyframes pc-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="./assets/index-D2sAs03R.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/monaco-D4zjdeIP.css">
    <link rel="stylesheet" crossorigin href="./assets/index-BK21dxAe.css">
  </head>
  <body>
    <div id="root">
      <div id="pc-splash">
        <div class="ring"></div>
        <div class="lbl">Loading canvas…</div>
      </div>
    </div>
  </body>
</html>
