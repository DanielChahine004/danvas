# danvasd across the three desktop OSes: build the broker, then hold it to the
# same conformance harness the Python hub passes — on every platform. A tag
# push (v*) additionally attaches the binaries to a GitHub release, which is
# what `_find_danvasd` users on other machines download.
name: broker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "broker/**"
      - "danvas/**"
      - "tests/**"
      - ".github/workflows/broker.yml"
  pull_request:
    paths: ["broker/**", "danvas/**", "tests/**"]
  workflow_dispatch:

jobs:
  build-and-conform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: danvasd-windows-x86_64
            exe: danvasd.exe
            wheel_plat: win_amd64
          - os: ubuntu-latest
            artifact: danvasd-linux-x86_64
            exe: danvasd
            target: x86_64-unknown-linux-musl
            wheel_plat: manylinux2014_x86_64
          - os: macos-latest
            artifact: danvasd-macos-arm64
            exe: danvasd
            wheel_plat: macosx_11_0_arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: musl tools (linux, for a static binary that runs on any distro)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build danvasd (release)
        working-directory: broker
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }}
            cp target/${{ matrix.target }}/release/${{ matrix.exe }} target/release/${{ matrix.exe }}
          else
            cargo build --release
          fi

      - name: Unit tests (danvasd internals — conflation, etc.)
        working-directory: broker
        run: cargo test --release

      - name: Install danvas + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest httpx2 numpy plotly opencv-python-headless

      - name: Conformance — Python hub (the reference)
        run: python -m pytest tests/test_conformance.py -q

      - name: Conformance — danvasd (this platform's binary)
        run: |
          BIN="$GITHUB_WORKSPACE/broker/target/release/${{ matrix.exe }}"
          DANVAS_HUB_CMD="$BIN|--port|{port}|--password|{password}" \
            python -m pytest tests/test_conformance.py -q

      - name: Full Python suite (Windows + Linux)
        if: matrix.os != 'macos-latest'
        run: python -m pytest tests/ -q

      - name: Build the offline wheel (binary bundled)
        run: |
          python -m pip install build wheel
          mkdir -p danvas/_bin
          cp broker/target/release/${{ matrix.exe }} danvas/_bin/
          python -m build --wheel
          # setup.py tags win/mac natively; a musl-static linux binary has no
          # glibc dep, so relabel linux_x86_64 -> manylinux2014 (installs
          # broadly). Runs only where a wheel with that tag exists.
          for w in dist/*linux_x86_64.whl; do
            [ -e "$w" ] || continue
            mv "$w" "${w/linux_x86_64/manylinux2014_x86_64}"
          done
          # the macos-latest runner is arm64 and ships an arm64 binary — pin
          # the tag to arm64 (Python's native universal2 tag would overclaim
          # Intel, where the arm binary can't run).
          for w in dist/*universal2.whl dist/*x86_64.whl; do
            [ -e "$w" ] || continue
            case "$w" in *macosx*) mv "$w" "$(echo "$w" | sed -E 's/macosx_[0-9_]+_(universal2|x86_64)/macosx_11_0_arm64/')";; esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            broker/target/release/${{ matrix.exe }}
            dist/*.whl

  python-compat:
    # The wheels claim >=3.9; prove the package actually imports and its suite
    # passes on the floor (3.9) and a fresh ceiling (3.13), not just 3.12.
    # Pure-Python check — no danvasd build (its behaviour is Python-agnostic).
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e . pytest httpx2 numpy plotly opencv-python-headless
      - run: python -m pytest tests/ -q

  release:
    # Tag v* -> the binaries become a GitHub release: what a user on any OS
    # points $DANVASD at (or drops on PATH) so serve()'s broker default works.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-conform
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stage binaries + wheels (+ a pure fallback wheel)
        run: |
          mkdir -p out
          # download-artifact preserves the uploaded paths, so binaries nest
          # under <artifact>/broker/target/release/ and wheels under
          # <artifact>/dist/ — find them by pattern, don't assume flat paths.
          cp dist/danvasd-windows-x86_64/broker/target/release/danvasd.exe out/danvasd-windows-x86_64.exe
          cp dist/danvasd-linux-x86_64/broker/target/release/danvasd out/danvasd-linux-x86_64
          cp dist/danvasd-macos-arm64/broker/target/release/danvasd out/danvasd-macos-arm64
          find dist -name '*.whl' -exec cp {} out/ \;
          # a pure py3-none-any wheel (no binary) for every other platform
          pip install build
          python -m build --wheel --outdir out
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
