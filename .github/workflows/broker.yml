# danvasd across the three desktop OSes: build the broker, then hold it to the
# same conformance harness the Python hub passes — on every platform. A tag
# push (v*) additionally attaches the binaries to a GitHub release, which is
# what `_find_danvasd` users on other machines download.
name: broker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "broker/**"
      - "danvas/**"
      - "tests/**"
      - ".github/workflows/broker.yml"
  pull_request:
    paths: ["broker/**", "danvas/**", "tests/**"]
  workflow_dispatch:

jobs:
  build-and-conform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: danvasd-windows-x86_64
            exe: danvasd.exe
          - os: ubuntu-latest
            artifact: danvasd-linux-x86_64
            exe: danvasd
          - os: macos-latest
            artifact: danvasd-macos-arm64
            exe: danvasd
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build danvasd (release)
        working-directory: broker
        run: cargo build --release

      - name: Unit tests (danvasd internals — conflation, etc.)
        working-directory: broker
        run: cargo test --release

      - name: Install danvas + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest httpx2 numpy plotly opencv-python-headless

      - name: Conformance — Python hub (the reference)
        run: python -m pytest tests/test_conformance.py -q

      - name: Conformance — danvasd (this platform's binary)
        run: |
          BIN="$GITHUB_WORKSPACE/broker/target/release/${{ matrix.exe }}"
          DANVAS_HUB_CMD="$BIN|--port|{port}|--password|{password}" \
            python -m pytest tests/test_conformance.py -q

      - name: Full Python suite (Windows + Linux)
        if: matrix.os != 'macos-latest'
        run: python -m pytest tests/ -q

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: broker/target/release/${{ matrix.exe }}

  release:
    # Tag v* -> the binaries become a GitHub release: what a user on any OS
    # points $DANVASD at (or drops on PATH) so serve()'s broker default works.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-conform
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Stage per-OS names
        run: |
          mkdir -p out
          cp dist/danvasd-windows-x86_64/danvasd.exe out/danvasd-windows-x86_64.exe
          cp dist/danvasd-linux-x86_64/danvasd out/danvasd-linux-x86_64
          cp dist/danvasd-macos-arm64/danvasd out/danvasd-macos-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
