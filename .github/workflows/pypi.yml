# Publish danvas to PyPI — MANUAL ONLY. A git tag makes a GitHub release
# (binaries + wheels); it never touches PyPI. When you're ready to publish a
# release to PyPI, run this workflow from the Actions tab with its tag.
#
# ONE-TIME PREREQUISITE (on PyPI, before the first run):
#   Create the project's Trusted Publisher — pypi.org → your project (or
#   "pending publisher" for a brand-new name) → Publishing → add:
#     owner: DanielChahine004   repo: danvas
#     workflow: pypi.yml        environment: pypi
#   Trusted publishing uses short-lived OIDC — no API token is ever stored.
#
# It republishes the exact wheels already attached to the GitHub release
# (byte-identical to what release downloaders got) plus a freshly built sdist
# (a source install has no binary and falls back to the embedded server).
name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect the release's wheels + build the sdist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" --pattern '*.whl' --dir dist
          # sdist has no binary (danvas/_bin absent) — a source install falls
          # back to the embedded server, which is correct.
          pip install build
          python -m build --sdist --outdir dist
          echo "--- publishing ---"; ls dist

      - uses: pypa/gh-action-pypi-publish@release/v1
