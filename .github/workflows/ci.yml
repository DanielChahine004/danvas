name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # [hub] gives test_conformance.py its python-hub-under-test; the
          # danvasd-dependent suites (sdk conformance, broker replay, browser
          # smoke) skip themselves here and run in broker.yml instead.
          pip install .[hub] numpy plotly pytest httpx
      - name: Run tests
        run: pytest -q

  package:
    # Builds the wheel and proves the frontend bundle actually ships and serves —
    # a missing pycanvas/frontend/dist/assets/* would otherwise install fine but
    # render a blank page, which unit tests can't catch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist
      - name: Install the built wheel into a clean environment
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
      - name: Assert the wheel ships the universal assets
        # serve() is broker-only and this wheel carries no danvasd, so the
        # check is packaging-shaped: the frontend dist, the template asset
        # (with contracts), and the panels' .jsx sources must all install.
        # That the frontend actually SERVES is broker.yml's conformance job.
        run: |
          /tmp/clean/bin/python - <<'PY'
          import json, os
          import danvas
          pkg = os.path.dirname(danvas.__file__)

          dist = os.path.join(pkg, "frontend", "dist")
          assets = os.path.join(dist, "assets")
          files = os.listdir(assets) if os.path.isdir(assets) else []
          assert any(f.endswith(".js") for f in files), f"no JS in {assets}: {files}"
          html = open(os.path.join(dist, "index.html"), encoding="utf-8").read()
          assert "<script" in html or "root" in html, "index.html looks empty"

          tpl = json.load(open(os.path.join(pkg, "templates", "components.json"),
                               encoding="utf-8"))["templates"]
          assert len(tpl) == 20, f"expected 20 templates, got {len(tpl)}"
          assert all("contract" in t for t in tpl.values()), "contract blocks missing"

          jsx = os.listdir(os.path.join(pkg, "components", "jsx"))
          assert len([f for f in jsx if f.endswith(".jsx")]) == 18, jsx

          c = danvas.Canvas()
          c.slider("s"); c.label("l", ""); c.inspector()
          print("PACKAGE SMOKE TEST OK:", len(files), "assets,",
                len(tpl), "templates,", len(jsx), "jsx sources")
          PY
